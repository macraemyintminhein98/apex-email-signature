<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apex Signatures</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .signature-preview { min-height: 150px; background-color: #f9fafb; border: 1px dashed #e5e7eb; display: flex; align-items: center; justify-content: center; text-align: center; color: #6b7280; }
        @media (max-width: 768px) { .flex-col-reverse-mobile { flex-direction: column-reverse; } }
    </style>
</head>
<body class="bg-gray-100 font-sans">
    <div class="container mx-auto p-4 md:p-8">
        <header class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold text-gray-800 mb-2">Apex Signatures</h1>
            <p class="text-xl text-gray-600">Professional email signatures, instantly.</p>
        </header>

        <main class="grid md:grid-cols-2 gap-8 flex-col-reverse-mobile">
            <section class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-2xl font-semibold text-gray-700 mb-4">Your Details</h2>
                <form>
                    <div class="mb-4">
                        <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="name" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                    </div>
                    <div class="mb-4">
                        <label for="title" class="block text-sm font-medium text-gray-700">Title</label>
                        <input type="text" id="title" class="mt-1 block w-full border border-gray-300 rounded-md shadow-sm p-2">
                    </div>
                    <!-- More fields here for company, website, social links -->
                    <div class="flex items-center justify-between mt-6">
                         <button type="button" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">Update Signature</button>
                         <button type="button" class="bg-green-600 text-white py-2 px-4 rounded-md hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">Copy HTML</button>
                    </div>
                </form>
            </section>

            <section class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-2xl font-semibold text-gray-700 mb-4">Signature Preview</h2>
                <div class="signature-preview rounded-md mb-6 p-4">
                    <p id="preview-text">Your signature will appear here.</p>
                </div>
                <div class="text-center">
                    <button class="bg-purple-600 text-white py-3 px-8 rounded-md text-lg hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-purple-500 focus:ring-offset-2">Get Your Signature Now ($9.99)</button>
                </div>
            </section>
        </main>

        <footer class="text-center mt-10 text-gray-500 text-sm">
            &copy; 2023 Apex Signatures. All rights reserved.
        </footer>
    </div>
    <script>
        // Basic JS for demo - actual product would have dynamic generation.
        document.addEventListener('DOMContentLoaded', () => {
            const nameInput = document.getElementById('name');
            const titleInput = document.getElementById('title');
            const previewText = document.getElementById('preview-text');

            const updatePreview = () => {
                const name = nameInput.value || 'John Doe';
                const title = titleInput.value || 'CEO, Example Inc.';
                previewText.innerHTML = `<p>${name}</p><p class="text-sm text-gray-500">${title}</p><p class="text-blue-600 text-sm">example.com</p>`;
            };

            nameInput.addEventListener('input', updatePreview);
            titleInput.addEventListener('input', updatePreview);
            updatePreview(); // Initial preview
        });
    </script>
</body>
</html>
